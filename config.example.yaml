domain: example.local
targets:
  - 10.0.0.0/24
credentials:
  - protocol: winrm
    accounts:
      - user: domain\username
        password: "your_password_here"
  - protocol: ssh
    accounts:
      - user: ssh_config         # подключение через ~/.ssh/config (User/IdentityFile/ProxyCommand)
      - user: root
        password: "your_password_here"
      - user: admin
        key_path: "/path/to/ssh/key"
enrichment:
  concurrency: 10       # одновременных SSH/WinRM/PsExec-сессий для web и scan
discovery:
  concurrency: 64       # одновременных TCP-проверок (Windows TCP-стек захлёбывается на больших значениях)
  timeout: 1.5          # секунд на одну проверку порта
  retries: 0            # повторов при неудаче (0 = быстрый скан, 1-2 для нестабильной сети)
ports_file: ports.json
exclusions: []
