<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Scan Report</title>
    <style>
        * {{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }}
        body {{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: white;
            padding: 20px;
            overflow-x: auto;
        }}
        .report-header {{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            margin-bottom: 10px;
            border-bottom: 2px solid #34495e;
        }}
        .report-header h1 {{
            font-size: 18px;
            color: #2c3e50;
        }}
        .report-header span {{
            font-size: 14px;
            color: #666;
        }}
        table {{
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }}
        thead {{
            background-color: #34495e;
            color: white;
        }}
        th {{
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border: 1px solid #2c3e50;
        }}
        td {{
            padding: 10px 12px;
            border: 1px solid #ddd;
        }}
        td a {{
            color: #2980b9;
            text-decoration: none;
        }}
        td a:hover {{
            text-decoration: underline;
        }}
        tbody tr:nth-child(even) {{
            background-color: #f9f9f9;
        }}
        tbody tr:hover {{
            background-color: #e8f4f8;
        }}
        .host-windows {{
            border-left: 4px solid #0078d4;
        }}
        .host-linux {{
            border-left: 4px solid #f7931e;
        }}
        .host-mikrotik {{
            border-left: 4px solid #e91e63;
        }}
        .host-unknown {{
            border-left: 4px solid #9e9e9e;
        }}
        .deep-scan-completed {{
            background-color: #d4edda !important;
            font-weight: 600;
        }}
        .default-creds-found {{
            background-color: #f8d7da !important;
            font-weight: 600;
        }}
        .default-creds-found td {{
            color: #721c24;
        }}
        /* Filter row styles */
        .filter-row th {{
            padding: 6px 4px;
            background-color: #3d566e;
        }}
        .filter-row select,
        .filter-row input {{
            width: 100%;
            padding: 4px 6px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 12px;
            font-family: inherit;
        }}
        .filter-row select {{
            cursor: pointer;
        }}
        .filter-row input::placeholder {{
            color: #aaa;
        }}


        .report-footer {{
            margin-top: 10px;
            padding: 10px 0;
            border-top: 1px solid #ddd;
            text-align: center;
            color: #555;
            font-size: 13px;
        }}
        @media (max-width: 768px) {{
            body {{
                padding: 10px;
            }}
            .report-header {{
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }}
            th, td {{
                padding: 8px;
                font-size: 14px;
            }}
        }}
    </style>
</head>
<body>
        <div class="report-header">
            <h1>Network Scan Report — {domain}</h1>
            <span>{targets}</span>
            <span>Generated: {timestamp} &nbsp;|&nbsp; Показано: <span id="visible-count">{total_hosts}</span> из {total_hosts}</span>
        </div>
        <table id="scan-table">
            <thead>
                <tr>
                    <th>IP Address</th>
                    <th>Hostname</th>
                    <th>Type</th>
                    <th>OS Type</th>
                    <th>OS</th>
                    <th>Vendor</th>
                    <th>Model</th>
                    <th>MAC Address</th>
                    <th>Deep Scan Status</th>
                    <th>Auth Method</th>
                    <th>Open Ports</th>
                    <th>Services</th>
                    <th>Last Updated</th>
                </tr>
                <tr class="filter-row">
                    <th><input type="text" data-col="0" placeholder="Filter..."></th>
                    <th><input type="text" data-col="1" placeholder="Filter..."></th>
                    <th><select data-col="2"><option value="">All</option></select></th>
                    <th><select data-col="3"><option value="">All</option></select></th>
                    <th><input type="text" data-col="4" placeholder="Filter..."></th>
                    <th><select data-col="5"><option value="">All</option></select></th>
                    <th><input type="text" data-col="6" placeholder="Filter..."></th>
                    <th><input type="text" data-col="7" placeholder="Filter..."></th>
                    <th><select data-col="8"><option value="">All</option></select></th>
                    <th><select data-col="9"><option value="">All</option></select></th>
                    <th><input type="text" data-col="10" placeholder="Filter..."></th>
                    <th><input type="text" data-col="11" placeholder="Filter..."></th>
                    <th><input type="text" data-col="12" placeholder="Filter..."></th>
                </tr>
            </thead>
            <tbody>
{table_rows}
            </tbody>
        </table>
    <div class="report-footer">Total hosts: {total_hosts} &nbsp;|&nbsp; {type_summary}</div>
    <script>
    function openRdp(ip) {{
        var content = 'full address:s:' + ip + '\r\nprompt for credentials:i:1\r\nscreen mode id:i:1\r\n';
        var blob = new Blob([content], {{type: 'application/x-rdp'}});
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = ip + '.rdp';
        a.click();
        URL.revokeObjectURL(a.href);
    }}
    </script>
    <script>
    (function() {{
        var table = document.getElementById('scan-table');
        var tbody = table.querySelector('tbody');
        var rows = tbody.querySelectorAll('tr');
        var filterRow = table.querySelector('.filter-row');
        var selects = filterRow.querySelectorAll('select');
        var inputs = filterRow.querySelectorAll('input, select');
        var visibleCount = document.getElementById('visible-count');

        // Populate select options from data
        selects.forEach(function(sel) {{
            var col = parseInt(sel.getAttribute('data-col'));
            var values = new Set();
            rows.forEach(function(row) {{
                var cell = row.cells[col];
                if (cell) {{
                    var text = cell.textContent.trim();
                    if (text) values.add(text);
                }}
            }});
            Array.from(values).sort().forEach(function(v) {{
                var opt = document.createElement('option');
                opt.value = v;
                opt.textContent = v;
                sel.appendChild(opt);
            }});
        }});

        function applyFilters() {{
            var filters = {{}};
            inputs.forEach(function(el) {{
                var col = parseInt(el.getAttribute('data-col'));
                var val = el.value.trim().toLowerCase();
                if (val) filters[col] = {{ value: val, isSelect: el.tagName === 'SELECT' }};
            }});

            var count = 0;
            rows.forEach(function(row) {{
                var show = true;
                for (var col in filters) {{
                    var cell = row.cells[col];
                    if (!cell) {{ show = false; break; }}
                    var text = cell.textContent.trim().toLowerCase();
                    var f = filters[col];
                    if (f.isSelect) {{
                        if (text !== f.value) {{ show = false; break; }}
                    }} else {{
                        if (text.indexOf(f.value) === -1) {{ show = false; break; }}
                    }}
                }}
                row.style.display = show ? '' : 'none';
                if (show) count++;
            }});
            visibleCount.textContent = count;
        }}

        inputs.forEach(function(el) {{
            el.addEventListener(el.tagName === 'SELECT' ? 'change' : 'input', applyFilters);
        }});
    }})();
    </script>
</body>
</html>
